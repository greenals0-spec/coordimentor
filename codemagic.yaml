workflows:
  ios-release:
    name: iOS Release (App Store)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.coordimentor.app
      groups:
        - ios_credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest

    scripts:
      - name: Install dependencies
        script: |
          node --version
          npm install --legacy-peer-deps --force
          npm install -g @capacitor/cli@latest

      - name: Build React app
        script: |
          cp .env.production .env 2>/dev/null || true
          CI=false npm run build

      - name: Capacitor sync iOS
        script: cap sync ios

      - name: Set iOS version
        script: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          VERSION=${LATEST_TAG#v}
          BUILD_NUMBER=$(($(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID") + 1))
          agvtool new-marketing-version "$VERSION"
          agvtool new-version -all "$BUILD_NUMBER"
        working_directory: ios/App

      - name: Patch firebase dependency
        script: |
          sed -i '' 's/.upToNextMajor(from: "10.0.0")/.upToNextMajor(from: "11.0.0")/' \
            node_modules/@capacitor-firebase/authentication/Package.swift
          echo "Patched Package.swift:"
          grep "firebase-ios-sdk" node_modules/@capacitor-firebase/authentication/Package.swift

      - name: Build iOS IPA
        script: |
          cat > /Users/builder/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9PK89Y8MHZ</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.coordimentor.app</key>
              <string>Coordimentor App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath ~/App.xcarchive \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath ~/App.xcarchive \
            -exportPath ~/ipa \
            -exportOptionsPlist /Users/builder/export_options.plist

    artifacts:
      - ~/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY      # Codemagic 환경변수
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true   # TestFlight 자동 업로드
        submit_to_app_store: false   # 수동 심사 제출로 설정 (true 시 자동 제출)
      email:
        recipients:
          - greenals0@gmail.com       # 빌드 완료/실패 알림 수신

  ios-debug:
    name: iOS Debug (테스트용)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.coordimentor.app
      node: latest

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build React app
        script: npm run build

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Build iOS IPA (debug)
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App" \
            --config Debug

    artifacts:
      - build/ios/ipa/*.ipa
