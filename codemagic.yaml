workflows:
  ios-release:
    name: iOS Release (App Store)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.coordimentor.app
      groups:
        - ios_credentials
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest

    cache:
      cache_paths:
        - $HOME/Library/Developer/Xcode/DerivedData/App-*/SourcePackages
        - $HOME/Library/Caches/org.swift.swiftpm

    scripts:
      - name: Install dependencies
        script: |
          node --version
          npm install --legacy-peer-deps --force
          npm install -g @capacitor/cli@latest

      - name: Build React app
        script: |
          cp .env.production .env 2>/dev/null || true
          CI=false npm run build

      - name: Capacitor sync iOS
        script: cap sync ios

      - name: Set iOS version
        script: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          VERSION=${LATEST_TAG#v}
          BUILD_NUMBER=$(($(app-store-connect get-latest-build-number "$APP_STORE_APPLE_ID") + 1))
          agvtool new-marketing-version "$VERSION"
          agvtool new-version -all "$BUILD_NUMBER"
        working_directory: ios/App

      - name: Patch firebase dependency
        script: |
          sed -i '' 's/.upToNextMajor(from: "10.0.0")/.upToNextMajor(from: "11.0.0")/' \
            node_modules/@capacitor-firebase/authentication/Package.swift
          echo "Patched Package.swift:"
          grep "firebase-ios-sdk" node_modules/@capacitor-firebase/authentication/Package.swift

      - name: Configure signing
        script: |
          # 설치된 프로파일에서 UUID 추출
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | python3 -c "import sys, plistlib; p = plistlib.loads(sys.stdin.buffer.read()); print(p['UUID'])")
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | python3 -c "import sys, plistlib; p = plistlib.loads(sys.stdin.buffer.read()); print(p['Name'])")
          echo "Profile UUID: $PROFILE_UUID"
          echo "Profile Name: $PROFILE_NAME"

          # project.pbxproj에 UUID로 설정
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID\";/g" \
            ios/App/App.xcodeproj/project.pbxproj

          echo "=== Signing in project.pbxproj ==="
          grep -E "CODE_SIGN_STYLE|PROVISIONING_PROFILE_SPECIFIER" ios/App/App.xcodeproj/project.pbxproj
          echo "=== Installed certificates ==="
          security find-identity -v -p codesigning

      - name: Build iOS IPA
        script: |
          cat > /Users/builder/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9PK89Y8MHZ</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.coordimentor.app</key>
              <string>Coordimentor App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - greenals0@gmail.com

  ios-debug:
    name: iOS Debug (테스트용)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.coordimentor.app
      node: latest

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build React app
        script: npm run build

      - name: Capacitor sync iOS
        script: npx cap sync ios

      - name: Build iOS IPA (debug)
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App" \
            --config Debug

    artifacts:
      - build/ios/ipa/*.ipa
